name: Tests

# Template 骨架：tests/ 尚不存在時整個 job 跳過（新 repo 出生即綠燈）；
# 一旦加入測試套件，pytest 自動成為 PR gate（滿足 policy R-19）。
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect test suite
        id: detect
        run: |
          if [ -d tests ] && ls tests/test_*.py tests/*_test.py >/dev/null 2>&1; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "No test suite yet; skipping pytest."
          fi

      - name: Setup Python
        if: steps.detect.outputs.has_tests == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and test dependencies
        if: steps.detect.outputs.has_tests == 'true'
        run: |
          python -m pip install --upgrade pip pytest
          if [ -f pyproject.toml ]; then python -m pip install -e ".[test]" || python -m pip install -e . || true; fi
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

      - name: Run test suite
        if: steps.detect.outputs.has_tests == 'true'
        run: python -m pytest tests/ -q
